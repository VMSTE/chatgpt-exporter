<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatGPT Exporter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #212121;
      color: #ececec;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #ececec;
      letter-spacing: -0.01em;
    }

    /* ── Content area ────────────────────────────────────── */
    .content {
      padding: 14px 16px 16px;
    }

    .meta { margin-bottom: 10px; }

    .meta-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6e6e6e;
      margin-bottom: 5px;
    }

    .meta-value {
      font-size: 13px;
      color: #cdcdcd;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 12px 0;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 9px 12px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      color: #cdcdcd;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      text-align: left;
    }
    .btn:last-of-type { margin-bottom: 0; }
    .btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.13);
      color: #ececec;
    }
    .btn:active { background: rgba(255,255,255,0.14); }

    .btn .icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.55;
    }

    .btn .ext {
      margin-left: auto;
      font-size: 11px;
      color: #5e5e5e;
      font-weight: 500;
      font-family: ui-monospace, monospace;
    }

    /* ── Toast ───────────────────────────────────────────── */
    .toast {
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    .toast.visible { opacity: 1; }
    .toast.ok {
      background: rgba(16,163,127,0.12);
      color: #10a37f;
      border: 1px solid rgba(16,163,127,0.25);
    }
    .toast.err {
      background: rgba(239,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.25);
    }

    /* ── Empty state ─────────────────────────────────────── */
    .empty {
      padding: 28px 16px 24px;
      text-align: center;
      color: #6e6e6e;
    }
    .empty .icon-wrap {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .empty p {
      font-size: 13px;
      line-height: 1.6;
      color: #7d7d7d;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <h1>ChatGPT Exporter</h1>
  </div>

  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
